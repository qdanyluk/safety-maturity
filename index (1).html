<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Safety Maturity">
<meta name="theme-color" content="#1a1d23">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Safety Culture Maturity Model</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f9fa;
    --surface-raised: #f0f1f3;
    --border: rgba(0,0,0,0.08);
    --text: #1a1d23;
    --text-muted: #5f6672;
    --text-dim: #8c919c;

    --pathological: #c0392b;
    --pathological-bg: rgba(192,57,43,0.07);
    --reactive: #d35400;
    --reactive-bg: rgba(211,84,0,0.07);
    --calculative: #b8960c;
    --calculative-bg: rgba(184,150,12,0.07);
    --proactive: #1a6fa8;
    --proactive-bg: rgba(26,111,168,0.07);
    --generative: #1e8449;
    --generative-bg: rgba(30,132,73,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 56px;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--text-muted), transparent);
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--text);
  }
  header p {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── Ladder row ── */
  .ladder {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 0;
    margin-bottom: 12px;
    padding: 0 20px;
  }
  .ladder-step {
    flex: 1;
    max-width: 240px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .ladder-step:hover { transform: translateY(-3px); }
  .ladder-step.active { transform: translateY(-4px); }
  .ladder-step .step-fill {
    padding: 22px 16px 18px;
    text-align: center;
    position: relative;
    transition: all 0.3s ease;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ladder-step.active .step-fill {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .ladder-step.active .step-number { opacity: 1; }

  .step-number {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 700;
    opacity: 0.35;
    margin-bottom: 4px;
  }
  .step-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .step-tagline {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    font-style: italic;
  }

  /* ── Axis labels ── */
  .axis-label-row {
    display: flex;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto 48px;
    padding: 0 20px;
  }
  .axis-label {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ── Detail panel ── */
  .detail-panel {
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 48px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .detail-header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  .detail-level-num {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 700;
    opacity: 0.2;
  }
  .detail-title-group { flex: 1; }
  .detail-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .detail-mantra {
    font-size: 15px;
    font-style: italic;
    color: var(--text-muted);
  }
  .detail-description {
    padding: 24px 36px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  /* ── Dimension grid ── */
  .dimensions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1px;
    background: rgba(0,0,0,0.04);
  }
  .dimension-card {
    background: transparent;
    padding: 24px 28px;
  }
  .dimension-icon {
    font-size: 18px;
    margin-bottom: 8px;
    display: block;
  }
  .dimension-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .dimension-desc {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
  }

  /* ── Dimension nav pills ── */
  .dimension-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .dim-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .dim-pill:hover { border-color: rgba(0,0,0,0.15); color: var(--text); }
  .dim-pill.active {
    background: rgba(0,0,0,0.06);
    border-color: rgba(0,0,0,0.2);
    color: var(--text);
  }

  /* ── Comparison table ── */
  .comparison-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 48px;
  }
  .comp-header {
    padding: 24px 36px;
    border-bottom: 1px solid var(--border);
  }
  .comp-header h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
  }
  .comp-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .comp-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s ease;
  }
  .comp-row:last-child { border-bottom: none; }
  .comp-row:hover { background: var(--surface-raised); }
  .comp-level {
    padding: 18px 24px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .comp-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .comp-text {
    padding: 18px 24px;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
  }

  /* ── Sources ── */
  .sources {
    text-align: center;
    padding: 32px 20px;
    border-top: 1px solid var(--border);
  }
  .sources-intro {
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
  .sources h4 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .sources p {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.8;
    max-width: 800px;
    margin: 0 auto;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .container { padding: 32px 16px 60px; }
    .ladder { flex-direction: column; align-items: stretch; gap: 4px; padding: 0 16px; }
    .ladder-step { max-width: 100%; }
    .ladder-step .step-fill { flex-direction: row; justify-content: flex-start; gap: 12px; padding: 14px 18px; border-top: none !important; border-left: 3px solid; }
    .step-number { font-size: 18px; margin-bottom: 0; }
    .step-tagline { margin-top: 0; margin-left: 4px; }
    .axis-label-row { display: none; }
    .detail-header { padding: 20px 20px 16px; }
    .detail-description { padding: 18px 20px; }
    .dimension-card { padding: 18px 20px; }
    .dimensions-grid { grid-template-columns: 1fr; }
    .comp-row { grid-template-columns: 110px 1fr; }
    .comp-level { padding: 14px 12px; font-size: 10px; }
    .comp-text { padding: 14px 16px; font-size: 13px; }
    .comp-header { padding: 18px 20px; }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const DATA = {
  levels: [
    {
      num: 1,
      name: "Pathological",
      color: "var(--pathological)",
      bgColor: "var(--pathological-bg)",
      mantra: "Who cares as long as we're not caught?",
      tagline: "Deny & avoid",
      description: "Safety is viewed as a problem caused by careless workers. The primary driver is business production, with safety addressed only to avoid regulatory penalties. There is active suppression of safety information, and the organization's fundamental orientation is toward avoiding blame and consequences rather than preventing harm.",
      dimensions: {
        leadership: "Leaders are disengaged from safety; view it as a cost centre and impediment to production. Safety responsibilities are delegated downward with no executive visibility or accountability.",
        participation: "Workers have no voice in safety matters. No consultation, committees, or feedback channels. Safety is imposed through rules, if addressed at all.",
        reporting: "Incidents are concealed, suppressed, or attributed to worker carelessness. Reporting is discouraged; those who report are seen as troublemakers. No near-miss reporting exists.",
        communication: "Safety communication is absent or limited to legally required postings. Information flows top-down only and is often withheld. Workers are uninformed about hazards.",
        learning: "No systematic investigation or analysis. Blame replaces root-cause inquiry. Repeat incidents are common. No organizational memory for safety lessons.",
        commitment: "No investment in safety beyond minimum legal requirements. Safety competes with and consistently loses to production priorities. No HSMS in place."
      }
    },
    {
      num: 2,
      name: "Reactive",
      color: "var(--reactive)",
      bgColor: "var(--reactive-bg)",
      mantra: "Safety is important — we do a lot after every accident.",
      tagline: "Respond to incidents",
      description: "The organization takes safety seriously but primarily after incidents occur. Management responds to events with corrective action, but efforts are short-lived and lack systematic follow-through. Safety is driven by reactions to failures rather than anticipation of risk. This is often a transitional stage, triggered by a significant incident or regulatory action.",
      dimensions: {
        leadership: "Leaders engage with safety episodically — typically after serious incidents. Commitment is genuine but inconsistent, fading as other priorities emerge. Safety ownership sits with the OHS department.",
        participation: "Worker involvement is limited to compliance with rules. Joint health and safety committees may exist but are administrative rather than influential. Safety is management's responsibility.",
        reporting: "Basic incident reporting exists, primarily for serious injuries and regulatory compliance. Investigations are cursory, focused on immediate causes. Limited analysis of trends or patterns.",
        communication: "Communication is reactive — safety alerts and bulletins issued after incidents. Messaging is top-down and compliance-oriented. Workers receive information but are not consulted.",
        learning: "Lessons are drawn from incidents but not systematically shared or retained. Corrective actions address symptoms, not root causes. Limited benchmarking or external learning.",
        commitment: "Budgets exist for reactive programs (e.g., PPE, post-incident training). Resources increase temporarily after incidents but are not sustained. Basic HSMS elements are emerging."
      }
    },
    {
      num: 3,
      name: "Calculative",
      color: "var(--calculative)",
      bgColor: "var(--calculative-bg)",
      mantra: "We have systems in place to manage all hazards.",
      tagline: "Systematize & measure",
      description: "The organization has invested in formal safety management systems and collects extensive data. Safety is managed through processes, procedures, audits, and metrics. However, there is a risk of overconfidence in systems — the paper reality may not match the operational reality. Safety is OHS-department driven, and the culture may prioritize audit-readiness over genuine risk reduction.",
      dimensions: {
        leadership: "Leaders support safety through resource allocation and policy endorsement. Engagement is structured (e.g., safety committees, review meetings) but may lack depth. Safety performance is tracked but may not influence operational decisions.",
        participation: "OHS committees are functional. Workers participate in inspections and hazard identification within defined structures. Safety is increasingly seen as a shared responsibility, though primarily driven by the OHS function.",
        reporting: "Comprehensive reporting systems are in place. Incident investigations are conducted with some causal analysis. Risk assessments exist within formal systems. Near-miss reporting is encouraged but may be inconsistent.",
        communication: "Established channels for safety communication — toolbox talks, newsletters, dashboards. Still primarily one-directional. Workers are informed but not yet active contributors to the safety dialogue.",
        learning: "Formal audit and evaluation programs. Trend analysis of lagging indicators. Some planned corrective action tracking. Learning is systematic but may be slow to translate into operational change.",
        commitment: "Safety management system is documented and maintained (e.g., aligned to ISO 45001 / CSA Z45001). Dedicated OHS resources and programs. Good regulatory compliance. Risk of complacency if metrics look favourable."
      }
    },
    {
      num: 4,
      name: "Proactive",
      color: "var(--proactive)",
      bgColor: "var(--proactive-bg)",
      mantra: "We work on problems we find before they become incidents.",
      tagline: "Anticipate & prevent",
      description: "The organization shifts from managing what has happened to actively preventing what could happen. Safety leadership is distributed across operations, and frontline workers are engaged as active contributors. The focus moves from lagging to leading indicators, and safety is integrated into operational decision-making. Trust between management and workers supports transparent reporting and open communication.",
      dimensions: {
        leadership: "Leaders are visibly and personally engaged. Safety is integrated into operational planning and decision-making. Leaders model desired behaviours and actively seek out safety concerns. Accountability is shared across operational leadership.",
        participation: "Workers are empowered to stop unsafe work and contribute to safety improvement. Active involvement in risk assessment, procedure development, and safety planning. Peer-to-peer safety engagement is common.",
        reporting: "High levels of near-miss and hazard reporting indicate a trusting culture. Investigations use systemic causal analysis methods. Data drives proactive risk reduction. Workers trust that reporting leads to meaningful action.",
        communication: "Two-way, transparent communication is the norm. Safety discussions are integrated into operational meetings. Workers feel comfortable raising concerns. Cross-functional sharing of lessons and best practices occurs regularly.",
        learning: "Organization actively seeks out what could go wrong, not just what has gone wrong. Benchmarking against industry peers. Leading indicators and predictive analytics inform program priorities. Processes for ongoing improvement are established.",
        commitment: "Safety is a core value, not just a priority. Integrated into strategy, budgeting, and performance management. Good alignment between HSMS and operational systems. Resources are sustained and evidence-informed."
      }
    },
    {
      num: 5,
      name: "Generative",
      color: "var(--generative)",
      bgColor: "var(--generative-bg)",
      mantra: "Safety is how we do business — it's embedded in everything.",
      tagline: "Integrate & sustain",
      description: "Safety is fully integrated into the organization's identity and operations. It is not a separate program but an intrinsic part of how work is designed, managed, and performed. The organization exhibits characteristics of a High Reliability Organization (HRO): chronic unease, deference to expertise, sensitivity to operations, and commitment to resilience. Safety performance is sustained through collective mindfulness, not just systems compliance.",
      dimensions: {
        leadership: "Safety leadership is embedded at every level. Leaders maintain 'chronic unease' — a healthy scepticism that current performance is sufficient. Executive decisions are visibly informed by safety considerations. Leadership actively seeks disconfirming information.",
        participation: "Full workforce empowerment and shared ownership. Safety is everyone's responsibility and is recognized as such in practice, not just in policy. Self-regulation, collective vigilance, and mutual accountability characterize the workforce culture.",
        reporting: "Comprehensive, trusted reporting culture including near-misses, unsafe conditions, and system vulnerabilities. Reporting is seen as a contribution, not a criticism. A just culture framework ensures fair, consistent responses to safety events.",
        communication: "Multi-directional, rich safety dialogue is normal. Constructive challenge and bad news are welcomed at all levels. Safety communication is indistinguishable from operational communication — it is simply part of how work is discussed.",
        learning: "The organization is a genuine learning organization for safety. Continuous improvement is habitual. External learning, research, and innovation are actively sought. Resilience thinking — anticipating, absorbing, adapting to, and recovering from disruptions — is embedded.",
        commitment: "Safety is an organizational value equal to production, quality, and financial performance. Fully sustained HSMS with integrated management systems. Safety considerations are woven into procurement, design, planning, and change management."
      }
    }
  ],
  dimensions: [
    { key: "leadership", name: "Leadership & Commitment", icon: "\u25C6" },
    { key: "participation", name: "Worker Participation", icon: "\u25B3" },
    { key: "reporting", name: "Reporting & Investigation", icon: "\u25C7" },
    { key: "communication", name: "Communication", icon: "\u25C8" },
    { key: "learning", name: "Learning & Improvement", icon: "\u25CB" },
    { key: "commitment", name: "Systems & Resources", icon: "\u25A1" }
  ]
};

function render() {
  var app = document.getElementById('app');
  var state = { activeLevel: 2, activeDimension: null };

  function draw() {
    var level = DATA.levels[state.activeLevel];
    var dim = state.activeDimension ? DATA.dimensions.find(function(d) { return d.key === state.activeDimension; }) : null;

    var html = '';
    html += '<header>';
    html += '<div class="badge">Evidence-Based Framework</div>';
    html += '<h1>Safety Culture Maturity Model</h1>';
    html += '</header>';

    html += '<div class="ladder">';
    DATA.levels.forEach(function(l, i) {
      html += '<div class="ladder-step ' + (i === state.activeLevel ? 'active' : '') + '" onclick="selectLevel(' + i + ')">';
      html += '<div class="step-fill" style="background:' + l.bgColor + '; border-top:3px solid ' + l.color + '">';
      html += '<div class="step-number" style="color:' + l.color + '">' + l.num + '</div>';
      html += '<div class="step-label" style="color:' + l.color + '">' + l.name + '</div>';
      html += '<div class="step-tagline">' + l.tagline + '</div>';
      html += '</div></div>';
    });
    html += '</div>';

    html += '<div class="axis-label-row">';
    html += '<span class="axis-label">&larr; Lower trust &amp; information</span>';
    html += '<span class="axis-label">Higher trust &amp; information &rarr;</span>';
    html += '</div>';

    html += '<div class="detail-panel" style="background:' + level.bgColor + '">';
    html += '<div class="detail-header">';
    html += '<div class="detail-level-num" style="color:' + level.color + '">' + level.num + '</div>';
    html += '<div class="detail-title-group">';
    html += '<div class="detail-title" style="color:' + level.color + '">' + level.name + '</div>';
    html += '<div class="detail-mantra">&ldquo;' + level.mantra + '&rdquo;</div>';
    html += '</div></div>';
    html += '<div class="detail-description">' + level.description + '</div>';
    html += '<div class="dimensions-grid">';
    DATA.dimensions.forEach(function(d) {
      html += '<div class="dimension-card">';
      html += '<span class="dimension-icon">' + d.icon + '</span>';
      html += '<div class="dimension-name">' + d.name + '</div>';
      html += '<div class="dimension-desc">' + level.dimensions[d.key] + '</div>';
      html += '</div>';
    });
    html += '</div></div>';

    html += '<div style="text-align:center; margin-bottom:16px;">';
    html += '<span style="font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim);">Compare across levels by dimension</span>';
    html += '</div>';

    html += '<div class="dimension-nav">';
    DATA.dimensions.forEach(function(d) {
      html += '<button class="dim-pill ' + (state.activeDimension === d.key ? 'active' : '') + '" onclick="selectDimension(\'' + d.key + '\')">';
      html += d.icon + ' ' + d.name;
      html += '</button>';
    });
    if (state.activeDimension) {
      html += '<button class="dim-pill" onclick="selectDimension(null)" style="color:var(--text-dim)">&times; Clear</button>';
    }
    html += '</div>';

    if (dim) {
      html += '<div class="comparison-table">';
      html += '<div class="comp-header">';
      html += '<h3>' + dim.icon + ' ' + dim.name + '</h3>';
      html += '<p>Progression across all five maturity levels</p>';
      html += '</div><div class="comp-rows">';
      DATA.levels.forEach(function(l) {
        html += '<div class="comp-row">';
        html += '<div class="comp-level"><span class="comp-dot" style="background:' + l.color + '"></span>' + l.name + '</div>';
        html += '<div class="comp-text">' + l.dimensions[dim.key] + '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    html += '<div class="sources">';
    html += '<p class="sources-intro">A synthesis of Hudson\'s Safety Culture Ladder (2001), the Fleming / UK HSE Maturity Model (2001), Parker et al.\'s assessment framework (2006), and Gonçalves Filho et al.\'s measurement dimensions (2010) — based on Westrum\'s Typology of Organisations &amp; the Hearts and Minds Programme, adapted for healthcare and high-reliability settings.</p>';
    html += '<h4>Sources &amp; Theoretical Foundations</h4>';
    html += '<p>';
    html += 'Hudson, P. (2001). Safety Management and Safety Culture: The Long, Hard and Winding Road. • ';
    html += 'Parker, D., Lawrie, M. &amp; Hudson, P. (2006). A framework for understanding the development of organisational safety culture. <em>Safety Science, 44</em>(6), 551–562. • ';
    html += 'Fleming, M. (2001). Safety Culture Maturity Model. UK HSE OTH 2000/049. • ';
    html += 'Gonçalves Filho, A.P., Andrade, J.C.S. &amp; de Oliveira Marinho, M.M. (2010). A safety culture maturity model for petrochemical companies in Brazil. <em>Safety Science, 48</em>(5), 615–624. • ';
    html += 'Westrum, R. (2004). A typology of organisational cultures. <em>Quality &amp; Safety in Health Care, 13</em>(Suppl 2), ii22–ii27. • ';
    html += 'Tappura, S., Jääskeläinen, A. &amp; Pirhonen, J. (2022). Designing a Safety Culture Maturity Model. <em>Springer</em>. • ';
    html += 'Aligned with CSA Z45001 / ISO 45001 management system requirements.';
    html += '</p></div>';

    app.innerHTML = html;
  }

  window.selectLevel = function(i) {
    state.activeLevel = i;
    draw();
  };

  window.selectDimension = function(key) {
    state.activeDimension = key;
    draw();
  };

  draw();
}

render();
