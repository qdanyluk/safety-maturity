<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rounded rectangle clip for app icon shape -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="512" height="512" fill="#1a1d23"/>

    <!-- Five ascending bars representing maturity levels -->
    <!-- Pathological - shortest -->
    <rect x="56" y="340" width="64" height="100" rx="6" fill="#c0392b"/>
    <!-- Reactive -->
    <rect x="136" y="290" width="64" height="150" rx="6" fill="#d35400"/>
    <!-- Calculative -->
    <rect x="216" y="230" width="64" height="210" rx="6" fill="#b8960c"/>
    <!-- Proactive -->
    <rect x="296" y="170" width="64" height="270" rx="6" fill="#1a6fa8"/>
    <!-- Generative - tallest -->
    <rect x="376" y="110" width="64" height="330" rx="6" fill="#1e8449"/>

    <!-- Base line -->
    <rect x="40" y="440" width="416" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>

    <!-- Shield/safety icon at top centre -->
    <g transform="translate(256, 72)" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5">
      <path d="M0,-28 C12,-28 24,-22 24,-10 C24,8 12,22 0,28 C-12,22 -24,8 -24,-10 C-24,-22 -12,-28 0,-28Z"/>
      <path d="M-7,0 L-2,5 L8,-5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
